services:
  # Node.js Backend API
  - type: web
    name: ai-resume-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: AI_SERVICE_URL
        value: https://ai-resume-nlp.onrender.com
      - key: FRONTEND_URL
        value: https://ai-resume-frontend.onrender.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # Python AI Engine (FastAPI + Groq LLM)
  - type: web
    name: ai-resume-nlp
    env: docker
    dockerfilePath: ./ai-engine/Dockerfile
    dockerContext: ./ai-engine
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: API_KEY
        generateValue: true
      - key: PORT
        value: 8080

  # React Frontend
  - type: web
    name: ai-resume-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_NODE_API_URL
        value: https://ai-resume-backend.onrender.com/api
      - key: REACT_APP_AI_API_URL
        value: https://ai-resume-nlp.onrender.com
      - key: REACT_APP_AI_API_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
